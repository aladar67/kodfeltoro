<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>kodfeltoro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,200,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        .code-box {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .digit {
            width: 40px;
            height: 50px;
            font-size: 22px;
            text-align: center;
            border-radius: 5px;
            border: none;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>feltoro</h1>

    <div class="code-box">
        <input type="text" maxlength="1" class="digit">
        <input type="text" maxlength="1" class="digit">
        <input type="text" maxlength="1" class="digit">
        <input type="text" maxlength="1" class="digit">
        <input type="text" maxlength="1" class="digit">
        <input type="text" maxlength="1" class="digit">
    </div>

    <p id="result"></p>
</div>

<script>
const inputs = document.querySelectorAll(".digit");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1) {
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "") {
            if (index > 0) {
                inputs[index - 1].focus();
            }
        }
    });
});
</script>

</body>
</html>
